name: 🐛 Bug Report
description: Report a bug or issue with the application
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below to help us fix the issue quickly.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "When I click on the search button, nothing happens..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: "The search should return matching tribes..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: "Nothing happens and no results are shown..."
    validations:
      required: true

  - type: dropdown
    id: page
    attributes:
      label: Which page is affected?
      options:
        - Home (Guess page)
        - Learn (Encyclopedia)
        - Tribe Detail Page
        - Blog
        - Blog Post
        - Recipes
        - Recipe Detail
        - Religions
        - Religion Detail
        - Religion Timeline
        - Quiz
        - Languages
        - Language Family Page
        - Global Origins
        - Other
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: Page URL
      description: What's the full URL where you encountered this bug?
      placeholder: "https://tribeguess.com/learn/kikuyu"

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Opera
        - Other
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: Device Type
      options:
        - Desktop
        - Mobile (iPhone)
        - Mobile (Android)
        - Tablet (iPad)
        - Tablet (Android)
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Console Errors
      description: Open browser DevTools (F12) → Console tab. Paste any red error messages here.
      placeholder: "TypeError: Cannot read property 'name' of undefined..."
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem. Drag and drop images here.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to ensure this bug hasn't been reported
          required: true
        - label: I have provided all the required information above
          required: true
